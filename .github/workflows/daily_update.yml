name: Daily Market Collection

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at midnight every day
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  collect_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies & LFS
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          git lfs install

      - name: Run Collection Script
        run: python scripts/collect_all.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DB_PATH: database/market_analyzer.db

      - name: Commit and Push Changes to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add database/market_analyzer.db
          git commit -m "Automated daily market snapshot [skip ci]" || echo "No changes to commit"
          git push

      - name: Push to HuggingFace (Stable Python API)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import HfApi; api = HfApi(); api.upload_file(path_or_fileobj='database/market_analyzer.db', path_in_repo='database/market_analyzer.db', repo_id='UygarTatar/market-trend-analyzer', repo_type='space', token='${{ secrets.HF_TOKEN }}')"
