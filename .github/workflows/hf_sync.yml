name: Sync to HuggingFace

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync_to_hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Push to HuggingFace Spaces (CLI Sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          huggingface-cli upload UygarTatar/market-trend-analyzer . . --repo-type=space --token=$HF_TOKEN
