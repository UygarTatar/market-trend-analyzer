name: Sync to HuggingFace

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync_to_hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Push to HuggingFace (Stable Python API)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import HfApi; api = HfApi(); api.upload_folder(folder_path='.', repo_id='UygarTatar/market-trend-analyzer', repo_type='space', token='${{ secrets.HF_TOKEN }}', ignore_patterns=['.git*', 'venv*'])"
